<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Shower Isaac - Mi Cartón</title>
    <!-- Modern and cute fonts for a baby shower -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background Animated Clouds -->
    <div class="clouds">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
        <div class="cloud cloud-4"></div>
        <div class="cloud cloud-5"></div>
    </div>

    <!-- Player Login -->
    <div id="player-login" class="container glass">
        <header>
            <h1 style="font-size: 2.2rem; margin-bottom: 0.5rem;">¡Bienvenidos al Bingo!</h1>
            <p style="color: var(--text-main); font-weight: 600; margin-bottom: 2rem;">Baby Shower de Isaac 🍼</p>
        </header>
        <div class="login-form">
            <p style="margin-bottom: 1rem; color: var(--text-light); font-weight: 600;">Ingresa tu nombre o el de tu familia para jugar:</p>
            <input type="text" id="player-name" placeholder="Ej: Familia Pérez" class="word-input" style="text-align: center;">
            <button id="btn-player-login" class="btn-primary">Entrar a Jugar</button>
        </div>
        <div style="margin-top: 25px;">
            <a href="admin.html" style="color: var(--text-light); text-decoration: none; font-size: 0.95rem; font-weight: 700;">¿Eres la mamá? Administrar Bingo</a>
        </div>
    </div>

    <!-- Player Board -->
    <div id="player-board-container" class="container glass hidden">
        <header>
            <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Cartón de <span id="display-name" style="color: #4facfe;"></span></h1>
            <div id="latest-word" class="latest-word-player">Esperando a que mamá empiece...</div>
        </header>

        <main id="player-mode">
            <div class="board-header">
                <span>I</span>
                <span>S</span>
                <span>A</span>
                <span>A</span>
                <span>C</span>
            </div>
            <div id="bingo-board" class="bingo-board">
                <!-- Grid items generated dynamically via JS -->
            </div>
            <div class="actions">
                <button id="btn-bingo" class="btn-bingo">¡BINGO!</button>
                <div style="margin-top: 15px;">
                    <button id="btn-new-card" class="btn-secondary" style="font-size: 0.9rem; padding: 10px 20px;">Generar Nuevo Cartón</button>
                    <div style="margin-top: 15px;">
                        <button id="btn-logout-player" class="btn-secondary" style="font-size: 0.9rem; padding: 10px 20px; background: transparent; border: 1px solid var(--text-light); color: var(--text-light); box-shadow: none;">Cambiar Nombre</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Celebration Modal Local -->
    <div id="celebration-modal" class="container glass hidden" style="position: fixed; z-index: 100; border: 4px solid #ffd700; background: rgba(255,255,255,0.95);">
        <h2 style="font-size: 2.5rem; color: #ff0844; font-family: 'Fredoka', sans-serif;">¡Felicidades! 🎉</h2>
        <p style="font-size: 1.2rem; font-weight: 600; color: var(--text-main); margin: 20px 0;">¡Le hemos enviado un aviso a mamá de que hiciste BINGO!</p>
        <button id="btn-close-celebration" class="btn-primary">Seguir Jugando</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="player.js"></script>
</body>
</html>
